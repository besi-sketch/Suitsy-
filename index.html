<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suitsy | New Collection 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=EUR&components=buttons,applepay"></script>
    <style>
        :root { --gold: #c5a059; --bg: #000; --card: #111; --text: #fff; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        nav { background: #000; padding: 15px 5%; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 2rem; font-weight: bold; text-transform: uppercase; letter-spacing: 6px; color: var(--gold); }
        
        .filter-bar { background: #111; padding: 15px 5%; display: flex; gap: 10px; overflow-x: auto; border-bottom: 1px solid #222; }
        .filter-btn { padding: 8px 20px; border: 1px solid var(--gold); color: var(--gold); background: none; border-radius: 20px; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .filter-btn.active, .filter-btn:hover { background: var(--gold); color: #000; }

        .container { padding: 30px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        
        .card { background: var(--card); border: 1px solid #222; overflow: hidden; transition: 0.3s; }
        .card:hover { border-color: var(--gold); transform: translateY(-3px); }
        .img-box { height: 420px; width: 100%; overflow: hidden; background: #222; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .info { padding: 20px; text-align: center; }
        .price { color: var(--gold); font-weight: bold; font-size: 1.4rem; margin: 10px 0; }
        
        .selectors { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; }
        select { background: #000; color: #fff; border: 1px solid #333; padding: 8px; border-radius: 5px; cursor: pointer; }
        
        .btn-add { width: 100%; padding: 15px; background: var(--gold); color: #000; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; border-radius: 5px; }

        #cartSidebar { position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; height: 100%; background: #000; border-left: 2px solid var(--gold); z-index: 2000; transition: 0.5s; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; }
        #cartSidebar.open { right: 0; }
        .cart-items { flex-grow: 1; overflow-y: auto; margin: 20px 0; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; background: #111; margin-bottom: 5px; }

        .payment-box { background: #0a0a0a; padding: 20px; border-radius: 8px; border: 1px solid #333; margin-top: auto; }
        .btn-cash { width: 100%; padding: 15px; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; border-radius: 5px; }

        .cart-trigger { cursor: pointer; position: relative; color: var(--gold); }
        .count { position: absolute; top: -10px; right: -10px; background: #fff; color: #000; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Suitsy</div>
        <div class="cart-trigger" onclick="toggleCart()">
            <i class="fa fa-shopping-bag fa-xl"></i>
            <span class="count" id="cartCount">0</span>
        </div>
    </nav>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="filter('all')">Të gjitha</button>
        <button class="filter-btn" onclick="filter('smoking')">Smoking</button>
        <button class="filter-btn" onclick="filter('modern')">Moderne</button>
    </div>

    <div class="container">
        <h1 style="text-align:center; letter-spacing:4px; margin-bottom:40px;">NEW COLLECTION 2026</h1>
        <div class="grid" id="productGrid"></div>
    </div>

    <div id="cartSidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="color:var(--gold); margin:0;">POROSIA JUAJ</h2>
            <i class="fa fa-times fa-lg" onclick="toggleCart()" style="cursor:pointer"></i>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="payment-box">
            <h4>Mënyra e Pagesës:</h4>
            <select id="paymentMethod" onchange="updatePaymentUI()">
                <option value="cash">Cash me Postë</option>
                <option value="online">Kartë / Apple Pay</option>
            </select>
            <div id="online-payment" style="display:none; margin-top:10px;"><div id="paypal-button-container"></div></div>
            <button id="cash-button" class="btn-cash" onclick="sendToWhatsApp()">KONFIRMO ME POSTË</button>
            <div style="margin-top:20px; font-size:1.5rem; display:flex; justify-content:space-between; border-top:1px solid #333; padding-top:15px; font-weight:bold;">
                <span>TOTALI:</span>
                <span style="color:var(--gold)"><span id="totalPrice">0</span> €</span>
            </div>
        </div>
    </div>

    <script>
        // Te dhenat e rregulluara me fotot direkte nga Unsplash
        const products = [
            { id: 1, name: "Smoking Beige Luxury", price: 210, cat: "smoking", img: "https://images.unsplash.com/photo-1594932224030-9409201f541f?w=600", color: "Beige" },
            { id: 2, name: "Kostum Black Stripe", price: 185, cat: "smoking", img: "https://images.unsplash.com/photo-1593032465175-481ac7f402a1?w=600", color: "Zi me Shirita" },
            { id: 3, name: "Kostum Green Luxury", price: 199, cat: "smoking", img: "https://images.unsplash.com/photo-1598808503744-ff8736d7593c?w=600", color: "E gjelbër" },
            { id: 4, name: "Kostum Classic Beige", price: 145, cat: "modern", img: "https://images.unsplash.com/photo-1507679799987-c73779587ccf?w=600", color: "Classic Beige" },
            { id: 5, name: "Tuxedo Modern Detail", price: 250, cat: "modern", img: "https://images.unsplash.com/photo-1555069519-03463b27882d?w=600", color: "E zezë" }
        ];

        let cart = [];

        function displayProducts(filteredData) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            filteredData.forEach(p => {
                grid.innerHTML += `
                    <div class="card">
                        <div class="img-box"><img src="${p.img}" onerror="this.src='https://via.placeholder.com/400x450/111/fff?text=Suitsy'"></div>
                        <div class="info">
                            <h3>${p.name}</h3>
                            <div class="price">${p.price} €</div>
                            <div class="selectors">
                                <select id="size-${p.id}">
                                    ${[48,50,52,54,56].map(s => `<option value="${s}">Masa: ${s}</option>`).join('')}
                                </select>
                                <select id="color-${p.id}"><option>${p.color}</option></select>
                            </div>
                            <button class="btn-add" onclick="addToCart(${p.id})">SHTO NË SHPORTË</button>
                        </div>
                    </div>`;
            });
        }

        function filter(cat) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            displayProducts(cat === 'all' ? products : products.filter(p => p.cat === cat));
        }

        function addToCart(id) {
            const item = products.find(p => p.id === id);
            const size = document.getElementById(`size-${id}`).value;
            cart.push({...item, size: size});
            updateCart();
            if(!document.getElementById('cartSidebar').classList.contains('open')) toggleCart();
        }

        function updateCart() {
            document.getElementById('cartCount').innerText = cart.length;
            const total = cart.reduce((sum, i) => sum + i.price, 0);
            document.getElementById('totalPrice').innerText = total;
            document.getElementById('cartItems').innerHTML = cart.map(i => `<div class="cart-item"><span>${i.name} (Masa: ${i.size}, Ngjyra: ${i.color})</span><span>${i.price}€</span></div>`).join('');
            renderPayPal(total);
        }

        function toggleCart() { document.getElementById('cartSidebar').classList.toggle('open'); }
        function updatePaymentUI() {
            const method = document.getElementById('paymentMethod').value;
            document.getElementById('online-payment').style.display = method === 'online' ? 'block' : 'none';
            document.getElementById('cash-button').style.display = method === 'cash' ? 'block' : 'none';
        }

        function renderPayPal(amount) {
            document.getElementById('paypal-button-container').innerHTML = '';
            if(amount <= 0) return;
            paypal.Buttons({
                style: { layout: 'vertical', color: 'gold', shape: 'rect' },
                createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: amount.toString() } }] }),
                onApprove: (data, actions) => actions.order.capture().then(() => { alert('Pagesa u krye!'); cart = []; updateCart(); })
            }).render('#paypal-button-container');
        }

        function sendToWhatsApp() {
            if(cart.length === 0) return alert("Shporta është bosh!");
            const total = document.getElementById('totalPrice').innerText;
            const items = cart.map(i => "• " + i.name + " (" + i.size + ", " + i.color + ")").join("%0A");
            const msg = `POROSI E RE - SUITSY%0A%0AArtikujt:%0A${items}%0A%0ATotali: ${total}€%0APagesa: CASH ME POSTË`;
            window.open(`https://wa.me/355688266055?text=${msg}`, '_blank');
        }

        displayProducts(products);
    </script>
</body>
</html>
